stages:
  - build
  - publish


build-job:
  tags:
    - saas-linux-large-amd64
  image: nixos/nix
  stage: build
  artifacts:
    paths:
      - dist
  script:
    - nix-shell -p gnumake minify statix deadnix ormolu --command 'make build'

publish-job:
  tags:
    - saas-linux-large-amd64
  image: nixos/nix
  stage: publish
  dependencies:
    - build-job
  rules:
    - if: $CI_COMMIT_BRANCH == "trunk"
  before_script:
    - mkdir /root/.aws && touch /root/.aws/credentials
    - echo "[default]" >> /root/.aws/credentials
    - echo "aws_access_key_id=$AWS_ACCESS_KEY_ID" >> /root/.aws/credentials
    - echo "aws_secret_access_key=$AWS_SECRET_ACCESS_KEY" >> /root/.aws/credentials
  script:
    - nix-shell -p gnumake awscli --command 'make publish'
 
